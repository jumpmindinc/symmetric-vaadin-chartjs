name: Release

on:
    workflow_dispatch:
        inputs:
            version:
                type: string
                description: Full version (major.minor.patch) number to release (example 1.2.3).
                required: true
            dry-run:
                description: Dry run the release? Primary use is testing.
                required: false
                default: false

run-name: "Release: ${{ inputs.version }}"

# Required secrets:
#   CENTRAL_TOKEN_USERNAME  - Username token from central.sonatype.com → Account → Generate User Token
#   CENTRAL_TOKEN_PASSWORD  - Password token from central.sonatype.com → Account → Generate User Token
#   GPG_PRIVATE_KEY         - Armored private key: gpg --export-secret-keys --armor KEY_ID | base64
#   GPG_PASSPHRASE          - Passphrase for the GPG key

jobs:
    create-release:
        env:
            JAVA_VERSION: '21'

        runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64
        permissions:
            contents: write

        steps:
            - uses: runs-on/action@v2
            - name: Validate version input
              shell: bash
              run: |
                  echo "Validating release version: ${{ github.event.inputs.version }}"
                  if [[ ! "${{ github.event.inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                      echo "ERROR: Invalid version input. Must be of the format major.minor.patch (e.g. 2.16.0)."
                      exit 1
                  fi

            - name: Checkout Source
              uses: actions/checkout@v4
              with:
                  clean: true
                  fetch-depth: 0

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                  java-version: ${{ env.JAVA_VERSION }}
                  distribution: 'temurin'
                  cache: maven
                  server-id: central
                  server-username: CENTRAL_USERNAME
                  server-password: CENTRAL_PASSWORD
                  gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
                  gpg-passphrase: GPG_PASSPHRASE

            - name: Deploy
              if: ${{ github.event.inputs.dry-run != 'true' }}
              run: mvn clean deploy -P release
              env:
                  CENTRAL_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
                  CENTRAL_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
                  GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

            - name: Build (dry run)
              if: ${{ github.event.inputs.dry-run == 'true' }}
              run: mvn clean verify -P release
              env:
                  GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

            - name: Does Tag Exist?
              id: check_tag_exists
              run: |
                  TAG="${{ github.event.inputs.version }}"
                  if git rev-parse "$TAG" >/dev/null 2>&1; then
                      echo "Tag $TAG already exists. Skipping tagging."
                  else
                      echo "should_tag=true" >> $GITHUB_OUTPUT
                  fi

            - name: Create Tag
              if: steps.check_tag_exists.outputs.should_tag
              id: create_tag
              run: |
                  TAG="${{ github.event.inputs.version }}"
                  git tag $TAG
                  git push origin $TAG

                  echo "TAG=$TAG" >> $GITHUB_OUTPUT

            - name: Build Changelog
              id: changelog
              if: steps.check_tag_exists.outputs.should_tag
              run: |
                  CURRENT_TAG=${{ steps.create_tag.outputs.TAG }}

                  # Get the previous tag (sorted by commit date, excluding current tag)
                  PREV_TAG=$(git tag --sort=-committerdate | grep -v "$CURRENT_TAG" | head -n 1)

                  # If no previous tag exists, use the first commit
                  if [ -z "$PREV_TAG" ]; then
                  PREV_TAG=$(git rev-list --max-parents=0 HEAD)
                  fi

                  # Get commit messages between the previous and current tag
                  CHANGELOG=$(git log --pretty="- %s (%h)" $PREV_TAG..$CURRENT_TAG)

                  # Write changelog to environment file
                  echo "CHANGELOG<<EOF" >> $GITHUB_ENV
                  echo "$CHANGELOG" >> $GITHUB_ENV
                  echo "EOF" >> $GITHUB_ENV

            - name: Create Release in GitHub
              if: steps.check_tag_exists.outputs.should_tag
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.create_tag.outputs.TAG }}
                  name: "Release ${{ steps.create_tag.outputs.TAG }}"
                  body: |
                      ## Release ${{ steps.create_tag.outputs.TAG }}

                      ### Changes
                      ${{ env.CHANGELOG }}
                  draft: false
                  prerelease: false
