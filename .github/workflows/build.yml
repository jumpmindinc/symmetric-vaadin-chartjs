
name: Build

on:
    workflow_call:
    workflow_dispatch:

jobs:
    build:
      name: Build
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Set up JDK 21
          uses: actions/setup-java@v4
          with:
            java-version: '21'
            distribution: 'temurin'
            cache: maven

        - name: Build with Maven
          run: |
            mvn -B clean compile --file pom.xml
